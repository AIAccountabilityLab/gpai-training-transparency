general_notes: "The public summary for the Apertus model family can be found as a PDF on HuggingFace in the same context as its models, for instance at <a href=\"https://huggingface.co/swiss-ai/Apertus-70B-2509/blob/main/Apertus_EU_Public_Summary.pdf\" target=\"_blank\">the repository of Apertus-70B-2509</a>. Each field of the template was filled in, including explicitly marking sections as not applicable, though some fields included superfluous information not relevant to the topic or question which caused a few points deduction. We assessed its score to be <span class=\"openness open\">92.90%</span> with Grade <strong>A</strong> for <strong><i>transparency</i></strong>, and <span class=\"openness open\">97.14%</span> with Grade <strong>A+</strong> for <strong><i>usefulness</i></strong>, which were the highest of all assessed summaries published before and during our initial research."