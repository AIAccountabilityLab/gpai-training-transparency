general_notes: "We did not find an explicitly published summary for Microsoft's Phi-4 model, but found a file <a href=\"https://huggingface.co/microsoft/phi-4/blob/main/data_summary_card.md\" target=\"_blank\">in its repository on HuggingFace</a> called \"data_summary_card.md\", whose structure closely matched that of the template. The title used in the file was \"Data Summary\", which was also title used by HuggingFace in its SmolLM public summary. We are uncertain as to whether this represents an industry practice of co-opting of the formal title of \"public summary of training content\" present in the template with a broader and vague title that could be confused with other data-related documentation also provided with GPAI models. We opted to assess this model regardless based on the assumption of stakeholders viewing the document as fulfilling the template requirements, as explained earlier.<br><br>The assessment showed that fields provided in the document are filled in to some extent, but that the document itself is quite sparse and does not provide many details and also had sections missing. We further found that section numbers and questions had a significant mismatch from what was provided in the template. The document also suffered from subjective non-relevant statements, such as question 2.3.1 on whether public data was used to train the model being answered with \"<i>Microsoft follows all relevant laws and regulations pertaining to personal information</i>\" &mdash; which is neither relevant nor clear. We also found the document did not provide required information significantly, for example subsequent parts that enquire about the source and uses of personal data (2.4 User data in template) were found completely missing. Our assessment reflects these systematic major issues in the outcomes where the document scored <span class=\"openness closed\">33.30%</span> with a Grade <strong>D</strong> for <i>transparency</i>, and <span class=\"openness closed\">24.54%</span> with a Grade <strong>F</strong> for <i>usefulness</i>, which is the lowest score amongst all assessed summaries published before and during our initial research."