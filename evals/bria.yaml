general_notes: "The public summary for the Bria 3.2 model is published by Bria AI on its website under the 'Security & Compliance' section, as a link to a PDF <a href=\"https://drive.google.com/file/d/13BhHQhd7vcDArPmpBrl_b2FpdBqkYU4n/view\" target=\"_blank\">hosted on Google Drive</a>. The summary closely follows the structure of the template, but provided contact details for the authorised representative and not for the company itself. The document also lacked some metadata such as version information and links to documentation. The summary describes training only involving licensed data, which requires relatively little disclosure through the template. We assessed its score as <span class=\"openness open\">86.97%</span> with a grade of <strong>B+</strong> for <i>transparency</i>, and <span class=\"openness open\">94.74%</span> with a grade of <strong>A</strong> for <i>usefulness</i>."