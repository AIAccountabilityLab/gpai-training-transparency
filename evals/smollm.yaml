general_notes: "The public summary for HuggingFace's SmolLM3-3B model is available on its platform as a <a href=\"https://huggingface.co/spaces/hfmlsoc/smollm3-eu-data-transparency\" target=\"_blank\">webpage</a>. In general, the structure of the template was preserved with clear indication of section numbers, consistent field labels, and explicitly indicating yes/no where applicable. Other than issues with accessibility, we found no major issues with the public summary. It scored <span class=\"openness open\">82.50%</span> and received a grade of <strong>B+</strong> for <strong><i>Transparency</i></strong>, and <span class=\"openness open\">86.01%</span> with grade <strong>B+</strong> for <strong><i>Usefulness</i></strong>, which meant that the summary was of a moderate but good quality. SmolLM scored particularly well on its disclosure of public data sources, a key disclosure demanded by Article 53(1)(d), and a good indicator of transparency in the model development process."