general_notes: "The open collaboration project SpeakLeash publishes a public summary for its Bielik v3 11B Instruct model <a href=\"https://bielik.ai/downloads/Bielik%2011B%20v3%20EU%20Public%20Summary.pdf\" target=\"_blank\">on its website</a> and also links it in its model card. The public summary follows the structure of the template, and describes Bielik as a fine-tuned version of Mistral. Of note, Bielik utilised the optional additional comments field in Section 1.3 to describe the purposes, regional, and linguistic characteristics of the dataset used as based on Polish and EU legal administrative domains and the inclusion of Silesian and Kashubian language Wikipedia pages. For their list of public data sources, however, the description referenced external documents ('preprints') which resulted in a deduction of points as relevant information was not provided in the document. We assessed its score to be <span class=\"openness open\">88.02%</span> with grade <strong>B+</strong> for <i>transparency</i>, and <span class=\"openness partial\">71.11%</span> with grade <strong>C+</strong> for <i>usefulness</i>."